<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>

  <header class="bg-primary text-white py-2 shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">
      <h1 class="h4 mb-0">Sistema de Cuestionarios Médicos</h1>
      <span class="badge bg-light text-dark">Versión 1.0</span>
    </div>
  </header>

  <main class="login-wrapper">
    <div class="login-box">
      <h3 class="text-center mb-4">Iniciar sesión</h3>
      <form action="/login" method="POST">
        <div class="mb-3">
          <label for="email" class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" name="email" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Contraseña</label>
          <input type="password" class="form-control" name="password" required>
        </div>
        <div class="d-grid">
          <button type="submit" class="btn btn-primary">Ingresar</button>
        </div>
      </form>
      <p class="mt-3 text-center">
        ¿No tienes cuenta? <a href="registro.html">Registrate acá</a>
      </p>
    </div>
  </main>

  <footer class="bg-light text-center text-muted py-3 border-top">
    <small>&copy; 2025 - Proyecto académico | Desarrollado por weboback</small>
  </footer>

</body>
</html>
