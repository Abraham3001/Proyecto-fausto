<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro de Usuario</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-light">

  <header class="bg-primary text-white py-3 shadow">
    <div class="container d-flex justify-content-between align-items-center">
      <h1 class="h4 mb-0">Sistema de Cuestionarios Médicos</h1>
      <span class="badge bg-light text-dark">Versión 1.0</span>
    </div>
  </header>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <h3 class="text-center mb-4">Registro</h3>
        <form action="/registro" method="POST">
          <div class="mb-3">
            <label for="email" class="form-label">Correo electrónico</label>
            <input type="email" class="form-control" name="email" required>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" class="form-control" name="password" required>
          </div>
          <div class="mb-3">
            <label for="rol" class="form-label">Rol</label>
            <select class="form-select" name="rol" required>
              <option value="">Seleccioná un rol</option>
              <option value="profesor">Profesor</option>
              <option value="estudiante">Estudiante</option>
            </select>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-success">Registrarse</button>
          </div>
        </form>
        <p class="text-center mt-3">
          ¿Ya tenés cuenta? <a href="login.html">Iniciar sesión</a>
        </p>
      </div>
    </div>
  </main>

  <footer class="bg-light text-center text-muted py-3 border-top">
    <small>&copy; 2025 - Proyecto académico | Desarrollado por weboback</small>
  </footer>

</body>
</html>
